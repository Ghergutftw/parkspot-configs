server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${infra.postgres.host}:${infra.postgres.port}/parking_db
    username: ${DB_USERNAME:parkspot}
    password: ${DB_PASSWORD:parkspot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${infra.redis.host}
      port: ${infra.redis.port}
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${infra.kafka.bootstrap-servers}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: parking-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.parkspot.*
        spring.json.use.type.headers: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${parkspot.issuer-uri:http://localhost:9000}
      client:
        registration:
          parking-service:
            provider: parkspot-auth
            client-id: parking-service
            client-secret: ${PARKING_SERVICE_CLIENT_SECRET:local-only-parking-service-secret}
            authorization-grant-type: client_credentials
            scope: internal
        provider:
          parkspot-auth:
            issuer-uri: ${parkspot.issuer-uri:http://localhost:9000}

aws:
  s3:
    region: ${infra.s3.region}
    access-key: ${infra.s3.access-key:}
    secret-key: ${infra.s3.secret-key:}
    bucket: ${infra.s3.bucket}
