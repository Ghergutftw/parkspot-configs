eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

infra:
  postgres:
    host: postgres
    port: 5432
  redis:
    host: redis
    port: 6379
  kafka:
    bootstrap-servers: kafka:9092
  s3:
    region: ${AWS_REGION:eu-central-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    bucket: ${S3_BUCKET:park-spot}

# browser-facing URLs stay on localhost: docker-compose publishes ports to the host,
# and the browser talks to the gateway/auth-server from outside the compose network.
parkspot:
  web-origin: http://localhost:4200

management:
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
